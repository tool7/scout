version: 2

project_name: scout

env_files:
  github_token: ~/.config/goreleaser/github_token

before:
  hooks:
    - go mod tidy

builds:
  - id: scout
    binary: scout
    main: ./cmd/scout
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X scout/internal/oauth.ClientID={{.Env.SCOUT_OAUTH_CLIENT_ID}}
      - -X scout/internal/oauth.ClientSecret={{.Env.SCOUT_OAUTH_CLIENT_SECRET}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - name: scout
    binaries:
      - scout
    repository:
      owner: tool7
      name: homebrew-tap
      branch: main
    homepage: "https://github.com/tool7/scout"
    description: "Local CLI for querying Git history, Jira tickets, and source code from configured projects."
    url:
      verified: "github.com/tool7/scout/"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
                           args: ["-dr", "com.apple.quarantine", "#{staged_path}/scout"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

